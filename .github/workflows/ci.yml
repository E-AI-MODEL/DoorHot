name: Door010 CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: door010-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Node.js workspace
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=moderate --json > npm-audit-report.json

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: door010-npm-audit-${{ github.sha }}
          path: npm-audit-report.json

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Execute all migrations
        run: npm run verify:migrations

      - name: Verify seed idempotency
        run: npm run verify:seed

      - name: Guard learned reranker quality and drift
        run: npm run benchmark:reranker:check

      - name: Guard shadow reranker quality
        run: npm run benchmark:shadow-reranker:check

      - name: Enforce dependency audit
        if: always() && steps.npm_audit.outcome == 'failure'
        run: |
          cat npm-audit-report.json
          exit 1

  e2e:
    name: Run browser parity tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Build workspace packages for the API dev server
        run: npx tsc -b

      - name: Install managed Chromium
        run: npx playwright install --with-deps chromium

      - name: Execute all Playwright scenarios
        run: npm run test:e2e -- --workers=1

  container:
    name: Validate deployment image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - verify
      - e2e

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Compose configuration
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          AUTH_TOKEN_SECRET: ci-auth-token-secret-with-at-least-32-characters
        run: docker compose config --quiet

      - name: Build API image
        run: docker build --tag door010-api:${{ github.sha }} .

      - name: Build web image
        run: docker build --file Dockerfile.web --tag door010-web:${{ github.sha }} .

# Production acceptance runs in .github/workflows/acceptance.yml

  readiness:
    name: Generate readiness report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - verify
      - e2e
      - container
    if: always()

    steps:
      - name: Compose readiness report
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          CONTAINER_RESULT: ${{ needs.container.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node - <<'SCRIPT'
          const fs = require("node:fs");

          const checks = {
            workspace: {
              status: process.env.VERIFY_RESULT,
              command:
                "npm audit && typecheck && test && build && " +
                "verify:migrations && verify:seed && reranker gates"
            },
            browserParity: {
              status: process.env.E2E_RESULT,
              command: "npm run test:e2e -- --workers=1"
            },
            deploymentImage: {
              status: process.env.CONTAINER_RESULT,
              command: "docker compose config && docker build (api, web)"
            }
          };

          const allGreen = Object.values(checks)
            .every((check) => check.status === "success");

          const report = {
            commitSha: process.env.GITHUB_SHA,
            generatedAt: new Date().toISOString(),
            nodeVersion: process.version,
            workflowRunUrl: process.env.RUN_URL,
            checks,
            overall: allGreen ? "GO_TECHNICAL" : "NO_GO",
            notCoveredByThisPipeline: [
              "staging loadtest (staging-load.yml)",
              "postgres restore drill (postgres-restore-drill.yml)",
              "provider- en realtime-acceptance (acceptance.yml)",
              "security review en DPIA (organisatorisch)"
            ]
          };

          fs.writeFileSync(
            "readiness-report.json",
            JSON.stringify(report, null, 2)
          );
          console.log(JSON.stringify(report, null, 2));

          if (!allGreen) process.exitCode = 1;
          SCRIPT

      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: door010-readiness-${{ github.sha }}
          path: readiness-report.json
