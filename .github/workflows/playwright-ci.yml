name: Door010 Playwright Browser Suite

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "packages/**"
      - "package-lock.json"
      - ".github/workflows/playwright-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "packages/**"
      - "package-lock.json"
      - ".github/workflows/playwright-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: door010-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    name: Chromium parity and journey dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    env:
      CI: "1"
      HOME: /root

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Validate test discovery
        working-directory: apps/web
        run: npx playwright test --list

      - name: Run all browser scenarios
        working-directory: apps/web
        run: npx playwright test --workers=1

      - name: Upload HTML report and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: door010-playwright-${{ github.run_id }}
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: warn
          retention-days: 21

      - name: Publish test summary
        if: always()
        run: |
          {
            echo "## Door010 Playwright"
            echo
            echo "- Workflow run: $GITHUB_RUN_ID"
            echo "- Commit: $GITHUB_SHA"
            echo "- Browser image: mcr.microsoft.com/playwright:v1.61.1-noble"
            echo "- Expected scenarios: 11"
          } >> "$GITHUB_STEP_SUMMARY"
