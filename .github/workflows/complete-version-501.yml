name: Complete Door010 version metadata

on:
  push:
    branches:
      - agent/complete-version-501

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-version-501
          fetch-depth: 0

      - name: Apply direct product version wiring
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          server_path = Path('apps/api/src/server.ts')
          server = server_path.read_text()
          import_line = 'import { PRODUCT_VERSION } from "./product-version.js";\n'
          anchor = 'import { registerSecurityControls } from "./security.js";\n'
          if import_line not in server:
              server = server.replace(anchor, anchor + import_line, 1)
          server = server.replace('version: "4.1.0"', 'version: PRODUCT_VERSION')
          capabilities = 'server.get("/v1/system/capabilities", async () => ({\n'
          if capabilities + '  version: PRODUCT_VERSION,\n' not in server:
              server = server.replace(
                  capabilities,
                  capabilities + '  version: PRODUCT_VERSION,\n',
                  1,
              )
          if '4.1.0' in server:
              raise SystemExit('Old API version literal remains in server.ts')
          server_path.write_text(server)

          security_path = Path('apps/api/src/security.ts')
          security = security_path.read_text()
          security = security.replace(
              'import { applyProductVersionMetadata } from "./product-version-metadata.js";\n',
              '',
          )
          security = security.replace(
              '\n  server.addHook("preSerialization", async (request, _reply, payload) => {\n'
              '    const route = request.routeOptions.url ?? request.url;\n'
              '    return applyProductVersionMetadata(route, payload);\n'
              '  });\n',
              '',
          )
          security_path.write_text(security)

          Path('apps/api/src/product-version-metadata.ts').unlink(missing_ok=True)
          Path('apps/api/src/product-version-metadata.test.ts').unlink(missing_ok=True)
          Path('.github/workflows/complete-version-501.yml').unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "wire API metadata to product version"
          git push origin HEAD:agent/complete-version-501
