name: Reusable release

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      DEPLOY_WEBHOOK_URL:
        required: true
      DEPLOY_WEBHOOK_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify release
        run: npm run ci

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image: ${{ steps.image.outputs.reference }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/door010-api:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/door010-api:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and publish web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/door010-web:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/door010-web:sha-${{ github.sha }}

      - name: Export image reference
        id: image
        run: |
          echo "reference=ghcr.io/${{ github.repository_owner }}/door010-api:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ inputs.environment_name }}

    steps:
      - name: Trigger deployment
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          IMAGE_REFERENCE: ${{ needs.publish.outputs.image }}
          ENVIRONMENT_NAME: ${{ inputs.environment_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          curl --fail-with-body             --retry 3             --retry-all-errors             --connect-timeout 10             --max-time 60             -X POST             -H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}"             -H "Content-Type: application/json"             --data "$(jq -n               --arg image "${IMAGE_REFERENCE}"               --arg environment "${ENVIRONMENT_NAME}"               --arg commit "${COMMIT_SHA}"               '{image: $image, environment: $environment, commit: $commit}')"             "${DEPLOY_WEBHOOK_URL}"
