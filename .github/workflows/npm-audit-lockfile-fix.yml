name: Door010 npm audit lockfile fix

on:
  push:
    branches:
      - agent/npm-audit-fast-uri-fix

permissions:
  contents: write

jobs:
  fix-lockfile:
    name: Regenerate secure lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: agent/npm-audit-fast-uri-fix

      - name: Configure Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Apply npm audit lockfile fix
        run: npm audit fix --package-lock-only --ignore-scripts

      - name: Verify scoped change
        run: |
          changed="$(git diff --name-only)"
          test "$changed" = "package-lock.json"

      - name: Verify patched fast-uri versions
        run: |
          node - <<'NODE'
          const lock = require('./package-lock.json');
          const expected = new Map([
            ['node_modules/fast-uri', '3.1.4'],
            ['node_modules/fast-json-stringify/node_modules/ajv/node_modules/fast-uri', '3.1.4'],
            ['node_modules/fast-json-stringify/node_modules/fast-uri', '4.1.1']
          ]);
          for (const [path, version] of expected) {
            const actual = lock.packages?.[path]?.version;
            if (actual !== version) {
              throw new Error(`${path}: expected ${version}, received ${actual}`);
            }
          }
          NODE

      - name: Install regenerated lockfile
        run: npm ci --ignore-scripts

      - name: Verify dependency audit
        run: npm audit --audit-level=moderate

      - name: Commit regenerated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Patch fast-uri transitive dependencies"
          git push origin HEAD:agent/npm-audit-fast-uri-fix
