services:
  acceptance-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: door010_acceptance
      POSTGRES_USER: door010
      POSTGRES_PASSWORD: acceptance-password
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U door010 -d door010_acceptance
      interval: 2s
      timeout: 3s
      retries: 30
    ports:
      - "55432:5432"
